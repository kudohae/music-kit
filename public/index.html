<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicKit</title>
  <link rel="stylesheet" href="style.css">
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- alphaTab (Guitar Pro) -->
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
  <!-- JSZip (batch IR export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div id="app">

  <!-- ── Sidebar nav ── -->
  <nav id="sidebar">
    <div id="logo">MusicKit</div>
    <button class="nav-btn active" data-section="library">
      <svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18" stroke-linecap="round"/></svg>
      Library
    </button>
    <button class="nav-btn" data-section="viewer">
      <svg viewBox="0 0 24 24"><path d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Viewer
    </button>
    <button class="nav-btn" data-section="ir-mixer">
      <svg viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      IR Mixer
    </button>
    <button class="nav-btn" data-section="chords">
      <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Chords
    </button>
    <button class="nav-btn" data-section="setlist">
      <svg viewBox="0 0 24 24"><path d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Setlist
    </button>
    <button class="nav-btn" data-section="capo">
      <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1M4.22 4.22l.707.707m12.02 12.02.708.708M1 12h1m20 0h1M4.22 19.78l.707-.707M18.95 5.05l.708-.708M12 7a5 5 0 100 10A5 5 0 0012 7z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Capo
    </button>
  </nav>

  <!-- ── Content ── -->
  <main id="content">

    <!-- Library -->
    <section id="library-section" class="section">
      <div class="section-header">
        <h2>Library</h2>
        <button class="btn accent" id="upload-btn">+ Add Song</button>
      </div>
      <div id="song-list" class="song-list"></div>
    </section>

    <!-- Viewer -->
    <section id="viewer-section" class="section hidden">
      <div id="viewer-toolbar" class="toolbar">
        <span id="viewer-song-name" class="toolbar-title">—</span>
        <div class="spacer"></div>
        <button class="tbtn" id="view-single-btn" title="Single page">
          <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="1.5"/></svg>
        </button>
        <button class="tbtn" id="view-double-btn" title="Double page">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
        </button>
        <span class="sep"></span>
        <button class="tbtn" id="prev-page-btn" title="Previous (PgUp)">
          <svg viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span id="page-indicator" class="page-info">—</span>
        <button class="tbtn" id="next-page-btn" title="Next (PgDn)">
          <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="sep"></span>
        <label class="zoom-group">
          Zoom
          <input type="range" id="viewer-zoom" min="40" max="250" value="100" step="10">
          <span id="viewer-zoom-val">100%</span>
        </label>
      </div>

      <!-- PDF / JPG view -->
      <div id="sheet-view" class="sheet-view">
        <div id="page-container" class="page-container single"></div>
        <div id="sheet-drop" class="drop-hint">
          <p>라이브러리에서 곡을 선택하거나<br>파일을 여기에 드래그하세요</p>
          <p class="sub">PDF · JPG · Guitar Pro</p>
        </div>
      </div>

      <!-- GP player (shown only for GP files) -->
      <div id="gp-view" class="gp-view hidden">
        <div id="gp-sidebar">
          <div class="sidebar-hdr">Tracks</div>
          <div id="gp-track-list"></div>
        </div>
        <div id="gp-score-wrap">
          <div id="at-main"></div>
          <div id="gp-drop" class="drop-hint">
            <p>Guitar Pro 파일을 드래그하거나<br>라이브러리에서 선택하세요</p>
          </div>
          <div id="gp-loading" class="gp-loading hidden">
            <span class="spinner"></span> Loading…
          </div>
        </div>
      </div>

      <!-- GP player bar -->
      <div id="player-bar" class="player-bar hidden">
        <button class="rbtn" id="stop-btn" disabled>
          <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1.5" fill="currentColor"/></svg>
        </button>
        <button class="rbtn accent" id="play-btn" disabled>
          <svg id="ico-play" viewBox="0 0 24 24"><path d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z" fill="currentColor"/></svg>
          <svg id="ico-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
        </button>
        <div id="progress-wrap">
          <div id="progress-bg"><div id="progress-fill"></div></div>
          <div class="time-row">
            <span id="time-cur">0:00</span>
            <span id="sf-status">Loading SoundFont…</span>
            <span id="time-total">0:00</span>
          </div>
        </div>
        <button class="tbtn" id="loop-btn" title="Loop">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Loop
        </button>
        <label class="zoom-group">
          Tempo
          <input type="range" id="tempo-range" min="25" max="200" value="100" step="5">
          <span id="tempo-val">100%</span>
        </label>
      </div>
    </section>

    <!-- IR Mixer -->
    <section id="ir-mixer-section" class="section hidden">
      <div class="section-header"><h2>IR Mixer</h2></div>
      <div class="ir-layout">
        <div class="ir-panel">
          <div class="panel-title">Files</div>
          <label class="file-drop-zone" id="dry-drop">
            <input type="file" id="dry-file" accept="audio/*" hidden>
            <svg viewBox="0 0 24 24"><path d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span id="dry-name">Dry WAV (click or drag)</span>
          </label>
          <label class="file-drop-zone" id="ir-drop">
            <input type="file" id="ir-file" accept="audio/wav,.wav" hidden>
            <svg viewBox="0 0 24 24"><path d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span id="ir-name">IR WAV (click or drag)</span>
          </label>
          <div id="ir-info" class="ir-info hidden"></div>
        </div>

        <div class="ir-panel">
          <div class="panel-title">Preview</div>
          <div class="mix-preview">
            <label>Mix (Wet %)
              <input type="range" id="preview-mix" min="0" max="100" value="50">
              <span id="preview-mix-val">50%</span>
            </label>
            <button class="btn" id="preview-btn" disabled>▶ Preview</button>
            <button class="btn" id="stop-preview-btn" disabled>■ Stop</button>
          </div>
        </div>

        <div class="ir-panel">
          <div class="panel-title">Export</div>
          <div class="export-config">
            <label>From %<input type="number" id="exp-from" value="0"  min="0" max="100" step="5"></label>
            <label>To %<input type="number"   id="exp-to"   value="100" min="0" max="100" step="5"></label>
            <label>Step %<input type="number" id="exp-step" value="25" min="1" max="100" step="1"></label>
            <div id="exp-preview-list" class="exp-list"></div>
            <label class="checkbox-row">
              <input type="checkbox" id="exp-normalize"> Normalize output (peak = 0 dBFS)
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="exp-trim"> Trim IR tail
            </label>
            <button class="btn accent" id="export-btn" disabled>Export WAV Files</button>
          </div>
          <div id="export-progress" class="export-progress hidden">
            <div class="progress-bar-bg"><div id="export-bar" class="progress-bar-fill"></div></div>
            <span id="export-status">Processing…</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Chord Charts -->
    <section id="chords-section" class="section hidden">
      <div class="section-header">
        <h2>Chord Charts</h2>
        <button class="btn accent" id="new-chart-btn">+ New Chart</button>
      </div>
      <div id="chart-list" class="chart-list"></div>

      <!-- Chart editor (shown inside section when editing) -->
      <div id="chart-editor" class="chart-editor hidden">
        <div class="chart-editor-header">
          <div class="chart-meta">
            <input id="chart-title"  class="meta-input" placeholder="Song Title">
            <input id="chart-artist" class="meta-input small" placeholder="Artist">
            <select id="chart-key" class="meta-input small">
              <option value="">Key…</option>
              <option>C</option><option>C#/Db</option><option>D</option><option>D#/Eb</option>
              <option>E</option><option>F</option><option>F#/Gb</option><option>G</option>
              <option>G#/Ab</option><option>A</option><option>A#/Bb</option><option>B</option>
            </select>
          </div>
          <div class="chart-actions">
            <button class="btn" id="add-section-btn">+ Section</button>
            <button class="btn accent" id="save-chart-btn">Save</button>
            <button class="btn" id="close-editor-btn">✕</button>
          </div>
        </div>
        <div id="sections-container" class="sections-container"></div>
      </div>
    </section>

    <!-- Setlist -->
    <section id="setlist-section" class="section hidden">
      <div class="section-header">
        <h2>Setlist</h2>
        <button class="btn accent" id="new-setlist-btn">+ New Setlist</button>
      </div>
      <div class="setlist-layout">
        <div id="setlist-list" class="setlist-list"></div>
        <div id="setlist-editor" class="setlist-editor hidden">
          <div class="setlist-editor-header">
            <input id="setlist-name" class="meta-input" placeholder="Setlist name">
            <button class="btn accent" id="save-setlist-btn">Save</button>
            <button class="btn" id="perform-btn" disabled>▶ Perform</button>
            <button class="btn" id="close-setlist-btn">✕</button>
          </div>
          <div class="setlist-cols">
            <div class="setlist-col">
              <div class="col-hdr">Library</div>
              <div id="sl-library-songs" class="sl-song-list"></div>
            </div>
            <div class="setlist-col">
              <div class="col-hdr">Setlist</div>
              <div id="sl-order" class="sl-song-list ordered"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Capo Calculator -->
    <section id="capo-section" class="section hidden">
      <div class="section-header"><h2>Capo Calculator</h2></div>
      <div class="capo-layout">
        <div class="capo-controls">
          <div class="ctrl-group">
            <label>Sounding Key</label>
            <div class="key-grid" id="key-grid"></div>
          </div>
          <div class="ctrl-group">
            <label>Capo Position</label>
            <div class="capo-grid" id="capo-grid"></div>
          </div>
          <div class="ctrl-group">
            <label>Scale</label>
            <div class="scale-btns">
              <button class="scale-btn active" data-scale="major">Major</button>
              <button class="scale-btn" data-scale="minor">Minor</button>
            </div>
          </div>
        </div>
        <div id="capo-result" class="capo-result"></div>
      </div>
    </section>

  </main>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Song</h3>
      <button class="btn-icon" id="close-upload-modal">✕</button>
    </div>
    <div class="modal-body">
      <label class="field">Title<input type="text" id="upload-title" placeholder="Song title"></label>
      <label class="field">Artist<input type="text" id="upload-artist" placeholder="Artist name"></label>
      <label class="file-drop-zone upload-drop" id="upload-drop">
        <input type="file" id="upload-files" multiple
          accept=".pdf,.jpg,.jpeg,.png,.webp,.gp,.gp3,.gp4,.gp5,.gpx,.gp7" hidden>
        <svg viewBox="0 0 24 24" style="width:32px;height:32px"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="upload-file-names">클릭 또는 드래그<br><small>PDF · JPG (여러 장) · Guitar Pro</small></span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn" id="cancel-upload">Cancel</button>
      <button class="btn accent" id="confirm-upload">Upload</button>
    </div>
  </div>
</div>

<!-- Performance Mode Overlay -->
<div id="perf-overlay" class="perf-overlay hidden">
  <div id="perf-header">
    <span id="perf-song-pos" class="perf-pos">1 / 1</span>
    <span id="perf-song-name" class="perf-name">—</span>
    <span id="perf-page-pos" class="perf-pos">1 / 1</span>
    <button class="tbtn" id="perf-exit" title="Exit (Esc)">✕ Exit</button>
  </div>
  <div id="perf-sheet" class="perf-sheet">
    <div id="perf-page-container" class="page-container single"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
